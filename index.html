<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mottosoft | The foundation of tomorrow's AI.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: clamp(48px, 6vw, 84px);
            font-weight: 600;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .logo-motto {
            color: #000000;
        }

        .logo-soft {
            color: #FFFFFF;
            background-color: #000000;
            padding: 12px 16px 16px 12px;
            margin-left: 1px;
        }

        .slogan {
            margin-top: 24px;
            color: #86868B;
            font-size: clamp(14px, 1.5vw, 18px);
            font-weight: 400;
            letter-spacing: 0.05em;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="brand-container">
        <div class="logo">
            <div class="logo-motto">motto</div>
            <div class="logo-soft">soft</div>
        </div>

        <div class="slogan">The foundation of tomorrow's AI.</div>
    </div>

</body>

</html>
