<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mottosoft | The architecture of tomorrow.</title>
    <style>
        /* Apple hissini ve geometrik kusursuzluğu veren Inter fontunu dahil ediyoruz */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        /* Sınırsız, temiz ve mutlak beyaz zemin kurgusu */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Pürüzsüz font render ayarları */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Tüm içeriği tam merkezde tutan taşıyıcı */
        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none; /* Metnin seçilmesini engelleyerek daha çok bir logo hissi verir */
        }

        /* Logo yapısı: Sıfır boşluk ve mükemmel hizalama */
        .logo {
            display: flex;
            align-items: center;
            font-size: clamp(48px, 6vw, 84px); /* Ekran boyutuna göre dinamik ancak sınırları olan ölçek */
            font-weight: 600; /* Semi-Bold, tok bir duruş için */
            letter-spacing: -0.04em; /* Harfleri hafifçe sıkıştırarak premium hissi artırıyoruz */
            line-height: 1;
        }

        /* Logonun aydınlık yüzü */
        .logo-motto {
            color: #000000;
        }

        /* Logonun karanlık, keskin, mühendislik yüzü */
        .logo-soft {
            color: #FFFFFF;
            background-color: #000000;
            padding: 12px 16px 16px 12px; /* Keskin bloğu oluşturan iç boşluklar */
            margin-left: 1px; /* Beyaz boşluktan siyaha geçişin kusursuz görünmesi için milimetrik dokunuş */
        }

        /* Slogan: Ana yapıdan rol çalmayan ama gücü hissettiren alt metin */
        .slogan {
            margin-top: 24px;
            color: #86868B; /* Göz yormayan, pasif nötr gri */
            font-size: clamp(14px, 1.5vw, 18px);
            font-weight: 400; /* Regular, sade ağırlık */
            letter-spacing: 0.05em; /* Harf arasını açarak sinematik/mimari bir duruş sergiliyoruz */
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <!-- Logo Bloğu -->
        <div class="logo">
            <div class="logo-motto">motto</div>
            <div class="logo-soft">soft</div>
        </div>
        
        <!-- Vizyon Sloganı -->
        <div class="slogan">The architecture of tomorrow.</div>
    </div>

</body>
</html>
